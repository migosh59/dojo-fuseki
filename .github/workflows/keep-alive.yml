name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://oimidjxvheebxeyspcrw.supabase.co/rest/v1/sgf_files?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY"
          echo " — Supabase pingé"
